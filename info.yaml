# Tiny Tapeout project information
project:
  title: "4-bit Palindrome Checker"
  author: "Stanushree"
  discord: ""
  description: "Checks if a 4-bit input is a palindrome and outputs 50 if true, else 0"
  language: "Verilog"
  clock_hz: 100000000   # 100 MHz typical TinyTapeout clock assumption

  tiles: "1x1"

  # MUST match your Verilog module name
  top_module: "tt_um_palindrome"

  source_files:
    - "project.v"

# Pin mapping (documented only)
pinout:
  ui[0]: "input bit 0"
  ui[1]: "input bit 1"
  ui[2]: "input bit 2"
  ui[3]: "input bit 3 (LSB of data)"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  uo[0]: "output bit 0"
  uo[1]: "output bit 1"
  uo[2]: "output bit 2"
  uo[3]: "output bit 3"
  uo[4]: "output bit 4"
  uo[5]: "output bit 5"
  uo[6]: "output bit 6"
  uo[7]: "output bit 7"

  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

yaml_version: 6
